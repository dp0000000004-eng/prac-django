{% extends 'mesy/layout.html' %}

{% block body %}
    {% if messages %}
        {% for message in messages %}
            <p style="color:green;">{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <label>Feedback</label>
        {{ form.message }}
        <input type="submit" class="submit-btn">
    </form>
{% endblock %}
